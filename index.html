<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap"
        rel="stylesheet">
    <meta property="og:title" content="Convite: Maitê faz 12!">
    <meta property="og:description" content="Olá, venha comemorar comigo este dia especial! Confirme sua presença.">
    <meta property="og:image" content="https://convite-digital-chi.vercel.app/convite-balao-rose.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://convite-digital-chi.vercel.app/">
    <title>Convite de Festa - Maitê 12 anos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            color: #9b4e4c;
            text-align: center;
        }

        .container-imagem {
            position: relative;
            width: auto;
            max-width: 600px;
            margin: 20px auto;
            border-radius: 20px;
            overflow: hidden;
        }

        .container-imagem img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 25px;
            padding: 10px;
        }

        .data {
            font-size: 1.5rem;
            color: #9b4e4c;
            font-weight: bold;
        }

        .texto-sobreposto {
            position: absolute;
            top: 15%;
            left: 0;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .texto-sobreposto h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            color: #643c07;
            margin-bottom: 5px;
        }

        .texto-sobreposto p {
            font-size: clamp(1rem, 4vw, 1.4rem);
            color: #9b5a2f;
        }

        .informacoes {
            color: #9b4e4c;
            position: absolute;
            bottom: 60%;
            display: block;
            text-align: center;
            padding: 30px 20px 20px;
            left: 0;
            width: 100%;
            font-size: 1.0rem;
        }

        #confirmacao {
            margin: 20px auto;
            max-width: 600px;
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            border: 1px solid #FFD700;
            border-radius: 20px;
            padding: 25px 15px;
            margin: 15px;
        }

        #confirmacao h2 {
            font-size: 1.4rem;
            color: #c8a800;
            text-align: center;
            margin-bottom: 6px;
        }

        #confirmacao>p {
            font-size: 0.9rem;
            color: #b0a080;
            text-align: center;
            margin-bottom: 20px;
        }

        #confirmacao>p strong {
            color: #c8a800;
        }

        #form-confirmacao {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            width: 100%;
        }

        /* LINHA DE CONVIDADO */
        .linha-convidado {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 6px;
            width: 90%;
            max-width: 400px;
        }

        .linha-convidado label {
            font-size: 0.78rem;
            color: #c8b87a;
            white-space: nowrap;
            width: 80px;
            text-align: right;
            flex-shrink: 0;
        }

        .linha-convidado input[type="text"] {
            flex: 1;
            padding: 10px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            background-color: #ffffff;
            color: #505050;
            font-size: 0.9rem;
            font-family: 'Merriweather', serif;
            outline: none;
            transition: border-color 0.2s;
            min-width: 0;
        }

        .linha-convidado input[type="text"]:focus {
            border-color: #FFD700;
        }

        .input-idade {
            width: 65px;
            padding: 10px 8px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            background-color: #ffffff;
            color: #505050;
            font-size: 0.9rem;
            font-family: 'Merriweather', serif;
            outline: none;
            text-align: center;
            transition: border-color 0.2s;
            flex-shrink: 0;
        }

        .input-idade:focus {
            border-color: #FFD700;
        }

        /* BOTÕES SIM / NÃO */
        .grupo-crianca {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }



        .idade {
            font-size: 0.72rem;
            color: #b0a080;
            text-align: right;
            width: 90%;
            max-width: 400px;
            margin-bottom: -4px;
        }

        /* BOTÃO CONFIRMAR */
        #btn-confirmar {
            width: 60%;
            max-width: 400px;
            padding: 14px;
            margin-top: 8px;
            border-radius: 30px;
            border: none;
            background-color: #FFD700;
            color: #5a3e00;
            font-size: 1rem;
            font-weight: bold;
            font-family: 'Merriweather', serif;
            cursor: pointer;
            display: block;
            transition: background-color 0.2s, transform 0.1s;
        }

        #btn-confirmar:hover {
            background-color: #e6c200;
        }

        #btn-confirmar:active {
            transform: scale(0.98);
        }

        /* BOTÃO RECUSAR */
        #btn-recusar {
            width: 60%;
            max-width: 400px;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid rgba(180, 180, 180, 0.5);
            background-color: transparent;
            color: #888;
            font-size: 0.9rem;
            font-family: 'Merriweather', serif;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        #btn-recusar:hover {
            border-color: #cc4444;
            color: #cc4444;
        }

        /* ================================================
           ÁREA DE SUCESSO — aparece após confirmar
        ================================================ */
        #area-confirmado {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
            margin-top: 8px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #msg-sucesso {
            font-size: 1rem;
            color: #4caf50;
            font-weight: bold;
            font-family: 'Merriweather', serif;
        }

        /* BOTÃO AGENDA — verde, visual diferente dos outros */
        #btn-agenda {
            width: 60%;
            max-width: 400px;
            padding: 12px;
            border-radius: 20px;
            border: 2px solid #4caf50;
            background-color: transparent;
            color: #4caf50;
            font-size: 0.95rem;
            font-family: 'Merriweather', serif;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }

        #btn-agenda:hover {
            background-color: #4caf50;
            color: #ffffff;
        }

        @media (max-width: 480px) {
            .texto-sobreposto {
                top: 10%;
            }

            .data {
                top: 10%;
            }

            .informacoes {
                top: 35%;
            }

            #confirmacao {
                margin-top: 10px;
            }

            .linha-convidado label {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="container-imagem">
        <img src="./convite_img_02.png" alt="Imagem de um balão dourado elegante" />

        <!--<div class="texto-sobreposto">
            <h1>Maitê faz 12</h1>
            <p>Olá, venha comemorar comigo este dia especial!</p>
        </div>

        <div class="informacoes">
            <p class="data">29 de Março de 2026 às 12h30.</p>
            <p>Sítio das Zitas</p>
            <p>Estr. dos Bandeirantes, 23050 - Vargem Grande</p>
            <p>Para as crianças: Levar roupa de piscina</p>
        </div> -->

        <section id="confirmacao">
            <h2>Confirme sua Presença</h2>
            <p>Por favor, confirme até o dia <strong>20 de Março</strong>.</p>

            <div id="form-confirmacao">

                <p class="idade">👶 Idade da criança</p>

                <div class="linha-convidado">
                    <label for="nome-convidado">Convidado 1:</label>
                    <input type="text" id="nome-convidado" placeholder="Nome do convidado" />
                    <div class="grupo-crianca">
                        <input type="number" class="input-idade" id="idade1" placeholder="Idade" min="1" max="99" />
                    </div>
                </div>

                <div class="linha-convidado">
                    <label for="nome-convidado_2">Convidado 2:</label>
                    <input type="text" id="nome-convidado_2" placeholder="Nome do convidado" />
                    <div class="grupo-crianca">
                        <input type="number" class="input-idade" id="idade2" placeholder="Idade" min="1" max="99" />
                    </div>
                </div>

                <div class="linha-convidado">
                    <label for="nome-convidado_3">Convidado 3:</label>
                    <input type="text" id="nome-convidado_3" placeholder="Nome do convidado" />
                    <div class="grupo-crianca">
                        <input type="number" class="input-idade" id="idade3" placeholder="Idade" min="1" max="99" />
                    </div>
                </div>

                <div class="linha-convidado">
                    <label for="nome-convidado_4">Convidado 4:</label>
                    <input type="text" id="nome-convidado_4" placeholder="Nome do convidado" />
                    <div class="grupo-crianca">
                        <input type="number" class="input-idade" id="idade4" placeholder="Idade" min="1" max="99" />
                    </div>
                </div>

                <button id="btn-confirmar" type="button">
                    ✅ Confirmar Presença via WhatsApp
                </button>

                <button id="btn-recusar" type="button">
                    ❌ Não poderei comparecer
                </button>

                <!-- Aparece somente após confirmar -->
                <div id="area-confirmado" hidden>
                    <p id="msg-sucesso">✅ Confirme na sua agenda! Até lá! 🎉</p>
                    <button id="btn-agenda" type="button">
                        📅 Adicionar à minha agenda
                    </button>
                </div>


            </div>
        </section>
    </div>

    <footer>
        <p>Mapa do endereço</p>
        <a href="https://www.google.com/maps/search/?api=1&query=Estr.+dos+Bandeirantes,+23050+-+Vargem+Grande,+Rio+de+Janeiro"
            target="_blank">
            <img src="./google-maps.png" alt="Clique para ver o endereço no Mapa"
                style="width: 10%; max-width: 100px; height: auto;">
        </a>
        <p style="font-size: 0.8rem; margin-top: 5px;">(Clique na imagem para abrir o GPS)</p>
        <p>Feito com ❤️ especialmente para você</p>
    </footer>

    <script>

        // ================================================
        // BOTÃO CONFIRMAR
        // ================================================
        document.getElementById('btn-confirmar').addEventListener('click', function () {

            const idade1 = document.getElementById('idade1').value.trim();
            const idade2 = document.getElementById('idade2').value.trim();
            const idade3 = document.getElementById('idade3').value.trim();
            const idade4 = document.getElementById('idade4').value.trim();

            // Ler também os nomes (evita ReferenceError se usados abaixo)
            const nome1 = document.getElementById('nome-convidado').value.trim();
            const nome2 = document.getElementById('nome-convidado_2').value.trim();
            const nome3 = document.getElementById('nome-convidado_3').value.trim();
            const nome4 = document.getElementById('nome-convidado_4').value.trim();

            if (nome1 === "") {
                alert("Por favor, preencha o nome do primeiro convidado.");
                return;

            }

            // IDs do Google Forms — nomes existentes
            const formID = "1FAIpQLSd_qJlNE8bEy44lnzlYFVeL3JVdvBr-v2FVCcvybbb7kCqpkQ";
            const entry_nome1 = "entry.2134929628";
            const entry_nome2 = "entry.746945272";
            const entry_nome3 = "entry.1516924380";
            const entry_nome4 = "entry.1575603338";

            // ↓ Substitua pelos IDs reais dos novos campos "É criança?" que vai criar no Forms
            const entry_idade1 = "entry.1266300583";
            const entry_idade2 = "entry.890342780";
            const entry_idade3 = "entry.903520774";
            const entry_idade4 = "entry.1437445319";

            const urlGoogle = `https://docs.google.com/forms/d/e/${formID}/formResponse?`
                + `${entry_nome1}=${encodeURIComponent(nome1)}`
                + `&${entry_nome2}=${encodeURIComponent(nome2)}`
                + `&${entry_nome3}=${encodeURIComponent(nome3)}`
                + `&${entry_nome4}=${encodeURIComponent(nome4)}`
                + `&${entry_idade1}=${encodeURIComponent(idade1)}`
                + `&${entry_idade2}=${encodeURIComponent(idade2)}`
                + `&${entry_idade3}=${encodeURIComponent(idade3)}`
                + `&${entry_idade4}=${encodeURIComponent(idade4)}`
                + `&submit=Submit`;

            // Monta mensagem do WhatsApp — linha por convidado
            function linha(nome, idade) {
                if (!nome) return "";
                const info = idade ? `${idade} anos` : "idade não informada";
                return `\n• ${nome} — ${info}`;
            }

            const textoWhats =
                `Olá! Confirmo presença na festa da Maitê! 🎉`
                + linha(nome1, idade1)
                + linha(nome2, idade2)
                + linha(nome3, idade3)
                + linha(nome4, idade4);

            const linkWhats = `https://wa.me/5521991259018?text=${encodeURIComponent(textoWhats)}`;



            // Envia para o Google Forms em segundo plano
            fetch(urlGoogle, { mode: 'no-cors' })
                .then(() => {
                    // Esconde os botões de confirmar e recusar
                    document.getElementById('btn-confirmar').hidden = true;
                    document.getElementById('btn-recusar').hidden = true;

                    // Mostra área de sucesso com botão de agenda
                    document.getElementById('area-confirmado').hidden = false;

                    // Abre o WhatsApp em nova aba
                    window.open(linkWhats, '_blank');
                })
                .catch(() => {
                    // Se fetch falhar, executa o fluxo mesmo assim
                    document.getElementById('btn-confirmar').hidden = true;
                    document.getElementById('btn-recusar').hidden = true;
                    document.getElementById('area-confirmado').hidden = false;
                    window.open(linkWhats, '_blank');
                });
        });
        // ================================================
        // BOTÃO AGENDA — abre Google Calendar com evento pronto
        // Data: 29/03/2026 às 12h30 (Brasília = UTC-3 → 15h30 UTC)
        // ================================================
        document.getElementById('btn-agenda').addEventListener('click', function () {
            const linkAgenda = 'https://calendar.google.com/calendar/render?action=TEMPLATE'
                + '&text=🎉+Festa+da+Maitê+12+anos'
                + '&dates=20260329T153000Z/20260329T213000Z'
                + '&details=Festa+de+aniversário+da+Maitê!+Para+as+crianças:+levar+roupa+de+piscina+🎈'
                + '&location=Estr.+dos+Bandeirantes,+23050+-+Vargem+Grande,+Rio+de+Janeiro';

            window.open(linkAgenda, '_blank');
        });

        // ================================================
        // BOTÃO RECUSAR
        // ================================================
        document.getElementById('btn-recusar').addEventListener('click', function () {
            alert("Poxa, que pena que não poderá ir! Obrigado por avisar. 💛");
        });

    </script>

</body>

</html>
